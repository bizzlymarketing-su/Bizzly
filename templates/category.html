{% extends "base.html" %}
{% block title %}Categorie: {{ category }}{% endblock %}
{% block content %}


<h1 class="catnip">{{ category | capitalize }}</h1>

<div class="business-grid">
    {% for b in businesses %}

        <a class="business-card" href="/business/{{ b.id }}">
            <img src="{{ url_for('static', filename=b.image) }}" alt="{{ b.name }}">
            <h2>{{ b.name }}</h2>
        </a>
    {% endfor %}
</div>


{% endblock %}
