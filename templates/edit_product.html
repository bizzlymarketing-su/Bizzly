<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Product bewerken - {{ product.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Product bewerken</h1>
    <form action="{{ url_for('edit_product', product_id=product.id) }}" method="POST" class="edit-form">
        <label for="name">Naam:</label>
        <input type="text" id="name" name="name" value="{{ product.name }}" required>

        <label for="description">Beschrijving:</label>
        <textarea id="description" name="description" required>{{ product.description }}</textarea>

        <label for="image">Afbeelding (URL):</label>
        <input type="text" id="image" name="image" value="{{ product.image }}">

        <button type="submit" class="btn">Opslaan</button>
        <a href="{{ url_for('dashboard') }}" class="btn">Annuleren</a>
    </form>
</body>
</html>
