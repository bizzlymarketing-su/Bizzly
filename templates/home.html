{% extends "base.html" %}
{% block title %}Bizzly{% endblock %}

{% block content %}

<header>
    <img src="{{ url_for('static', filename='images/bizz1.png') }}" alt="Bizzly Logo" class="logo">
    <h1>Ontdek lokale bedrijven in Suriname met Bizzly</h1>
</header>

<div class="business-grid" id="business-grid">
    {% for b in businesses %}
    <div class="business-card" style="display: none;">
        <img src="{{ b.image }}" alt="{{ b.name }}">
        <h2>{{ b.name }}</h2>
        <a href="/business/{{ b.id }}"><button>Bekijk info</button></a>
    </div>
    {% endfor %}
</div>

<div class="load-more-wrapper">
    <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Laad meer ↓</button>
</div>

<script>
    const cards = document.querySelectorAll('.business-card');
    let visible = 0;

    function loadMore() {
        let count = 0;
        for (let i = visible; i < cards.length; i++) {
            if (count < 9) {
                cards[i].style.display = 'block';
                count++;
            }
        }
        visible += count;
        if (visible >= cards.length) {
            document.getElementById('load-more-btn').style.display = 'none';
        }
    }
    loadMore();
</script>

{% endblock %}
